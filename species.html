<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lâminas UMC - Espécies</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="./assets/css/styles.css" rel="stylesheet">
</link></head>
<body data-page="species">

  <div id="appView" class="app-container" style="display: flex;">
    <header class="main-header">
<div class="header-content">
<div class="logo-area" id="logoHomeBtn">
<div class="brand-logo-small">L</div>
<span class="logo-text">Lâminas UMC</span>
</div>
<div class="user-area">
<div class="user-icon">👤</div>
<div class="user-info">
<span class="user-name" id="loggedUserName">Utilizador</span>
</div>
<button class="logout-btn" id="logoutBtn" title="Sair do Sistema">Sair</button>
</div>
</div>
</header>
    <nav class="main-nav">
<div class="nav-content">
<button class="nav-item" data-page="upload">🔬 LÂMINAS</button>
<button class="nav-item" data-page="compare">⚖️ ESTUDO COMPARATIVO</button>
<button class="nav-item" data-page="admin" id="navAdmin" style="display:none;">⚙️ ACESSOS</button>
<button class="nav-item" data-page="species" id="navSpecies" style="display:none;">🐾 CADASTRO DE ESPÉCIES</button>
<button class="nav-item" data-page="anatomy" id="navAnatomy" style="display:none;">🧫 CADASTRO DE LESÕES</button>
</div>
</nav>
    <main class="content main-container">
      <section class="page active" id="species">
<div class="card border-accent">
<div class="section-header">
<h2>Cadastro de Espécies e Raças</h2>
<p>Cadastre os tipos de espécies atendidas pela clínica ou adicione novas raças às espécies existentes.</p>
</div>
<div class="grid two equal">
<div>
<form id="addSpeciesForm">
<label>Espécie Animal</label>
<input id="newSpeciesName" data-suggestions="speciesDatalist" placeholder="Selecione ou digite uma nova" required="" type="text"/>
<datalist id="speciesDatalist"></datalist>
<label>Raças (separadas por vírgula)</label>
<input id="newSpeciesBreeds" placeholder="Ex: Mangalarga, Puro Sangue..." required="" type="text"/>
<button class="btn-primary mt-3 block" type="submit">Cadastrar Espécie/Raça</button>
</form>
</div>
<div class="info-box" style="background: white;">
<h3 style="margin-top:0; color:var(--vet-primary); border-bottom:1px solid var(--border); padding-bottom:8px;">Espécies Registadas</h3>
<div id="adminSpeciesList" style="max-height: 280px; overflow-y: auto;"></div>
</div>
</div>
</div>
</section>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
